name: deploy-infra

on:
  push:
    branches: [main]
    paths:
      - "cloudformation/**"
      - "lambda/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ARTIFACTS_BUCKET: ${{ vars.ARTIFACTS_BUCKET }}
  ENV: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read non-secret params
        id: params
        run: |
          set -euo pipefail
          f=cloudformation/parameters/${ENV}.json
          {
            echo "namespace=$(jq -r .observability.Namespace $f)"
            echo "workspace_name=$(jq -r .grafana.WorkspaceName $f)"
            echo "grafana_version=$(jq -r .grafana.GrafanaVersion $f)"
            echo "plugins=$(jq -r .grafana.PluginsToInstall $f)"
          } >> "$GITHUB_OUTPUT"

      # Observability stack.
      - name: Deploy observability stack
        run: |
          aws cloudformation deploy \
            --stack-name osp-observability \
            --template-file cloudformation/observability.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Namespace=${{ steps.params.outputs.namespace }} \
              AlertsEmail=${{ vars.ALERTS_EMAIL }}

      - name: Capture observability outputs
        id: obs
        run: |
          arn=$(aws cloudformation describe-stacks --stack-name osp-observability \
            --query "Stacks[0].Outputs[?OutputKey=='SnsTopicArn'].OutputValue" --output text)
          echo "sns_topic_arn=$arn" >> "$GITHUB_OUTPUT"

      # Package + upload the custom resource Lambda.
      - name: Package Lambda
        id: pkg
        run: |
          mkdir -p build
          cp lambda/grafana_custom_resource/index.py build/
          (cd build && zip -9 -q grafana_custom_resource.zip index.py)
          key="grafana-osp/${GITHUB_SHA}/grafana_custom_resource.zip"
          aws s3 cp build/grafana_custom_resource.zip "s3://${ARTIFACTS_BUCKET}/${key}"
          echo "bucket=${ARTIFACTS_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "key=${key}"                 >> "$GITHUB_OUTPUT"

      # Grafana workspace stack. Template accepts the Lambda zip location as
      # a parameter so there is no template rewriting at deploy time.
      - name: Deploy Grafana workspace stack
        run: |
          aws cloudformation deploy \
            --stack-name osp-grafana \
            --template-file cloudformation/grafana-workspace.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              WorkspaceName=${{ steps.params.outputs.workspace_name }} \
              GrafanaVersion=${{ steps.params.outputs.grafana_version }} \
              AdminGroupId=${{ vars.ADMIN_GROUP_ID }} \
              PluginsToInstall=${{ steps.params.outputs.plugins }} \
              SnsTopicArn=${{ steps.obs.outputs.sns_topic_arn }} \
              CustomResourceBucket=${{ steps.pkg.outputs.bucket }} \
              CustomResourceKey=${{ steps.pkg.outputs.key }}

      - name: Stack outputs
        run: |
          aws cloudformation describe-stacks --stack-name osp-grafana \
            --query "Stacks[0].Outputs" --output table
